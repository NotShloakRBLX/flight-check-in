<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#070b16" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Flight Check In</title>

  <style>
    :root {
      --bg: #070b16;
      --panel: rgba(15, 22, 34, 0.84);
      --panel-strong: rgba(18, 27, 42, 0.96);
      --line: rgba(255, 255, 255, 0.12);
      --line-strong: rgba(255, 255, 255, 0.2);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.66);
      --soft: rgba(255, 255, 255, 0.42);
      --green: #22d87a;
      --green-2: #0fb665;
      --blue: #43a9ff;
      --blue-2: #1778ff;
      --red: #ff4b55;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100svh;
      background:
        radial-gradient(circle at top left, rgba(45, 89, 210, 0.24), transparent 34%),
        radial-gradient(circle at top right, rgba(0, 196, 142, 0.14), transparent 28%),
        linear-gradient(180deg, #070b16 0%, #06111b 100%);
      background-color: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    button {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .hidden {
      display: none !important;
    }

    .app {
  width: min(100%, 720px);
  min-height: 100svh;
  margin: 0 auto;
  padding: calc(10px + env(safe-area-inset-top)) 16px calc(34px + env(safe-area-inset-bottom));
}

    .screen {
      animation: screenIn 0.34s cubic-bezier(.2,.8,.2,1) both;
    }

    @keyframes screenIn {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.99);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes stepIn {
      from {
        opacity: 0;
        transform: translateX(22px) scale(0.985);
        filter: blur(3px);
      }

      to {
        opacity: 1;
        transform: translateX(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes stepOut {
      from {
        opacity: 1;
        transform: translateX(0);
      }

      to {
        opacity: 0;
        transform: translateX(-18px);
      }
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .top {
      margin-bottom: 18px;
    }

    .eyebrow {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 5px 0 0;
      font-size: clamp(34px, 10vw, 56px);
      line-height: 0.96;
      letter-spacing: -0.055em;
    }

    .progress-wrap {
      margin: 18px 0 18px;
    }

    .progress {
  width: min(100%, 270px);
  margin: 0 auto 13px;
  position: relative;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

    .progress-line,
.progress-fill {
  position: absolute;
  left: 11px;
  right: 11px;
  top: 50%;
  height: 2.5px;
  border-radius: 999px;
  transform: translateY(-50%);
}

    .progress-line {
      background: rgba(255, 255, 255, 0.16);
    }

    .progress-fill {
      right: auto;
      width: var(--progress-width, 0%);
      background: linear-gradient(90deg, var(--green), #7df7b6);
      transition: width 0.34s cubic-bezier(.2,.8,.2,1);
    }

    .dot {
  width: 22px;
  height: 22px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.2);
      background: #111827;
      position: relative;
      z-index: 1;
      transition: background 0.24s ease, border-color 0.24s ease, transform 0.24s ease;
      cursor: pointer;
      padding: 0;
    }

    .dot.active {
      border-color: rgba(34, 216, 122, 0.8);
      background: var(--green);
      transform: scale(1.08);
      box-shadow: 0 0 0 6px rgba(34, 216, 122, 0.13);
    }

    .progress-underline {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
    }

    .flight-hero {
      border: 1px solid var(--line);
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.035)),
        var(--panel);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 20px 52px rgba(0,0,0,0.28);
      backdrop-filter: blur(18px);
      padding: 16px;
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 14px;
      align-items: center;
      margin-bottom: 18px;
    }

    .airline-logo {
      width: 52px;
      height: 52px;
      object-fit: contain;
    }

    .route {
      font-size: clamp(30px, 9vw, 44px);
      font-weight: 950;
      line-height: 1;
      letter-spacing: -0.055em;
    }

    .route span {
      color: var(--blue);
    }

    .hero-meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .hero-code {
      margin-top: 10px;
      color: var(--blue);
      font-size: 23px;
      font-weight: 950;
      letter-spacing: 0.05em;
    }

    .step-panel {
      animation: stepIn 0.34s cubic-bezier(.2,.8,.2,1) both;
    }

    .step-panel.exiting {
      animation: stepOut 0.2s ease both;
    }

    .panel-title {
      margin: 0 0 18px;
      font-size: clamp(30px, 8.8vw, 44px);
      line-height: 1.02;
      font-weight: 950;
      letter-spacing: -0.055em;
    }

    .passenger-card,
    .advisory-card,
    .details-card,
    .arrival-card {
      border: 1px solid var(--line);
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.075), rgba(255,255,255,0.035)),
        var(--panel);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 18px 46px rgba(0,0,0,0.24);
      backdrop-filter: blur(18px);
    }

    .passenger-card {
      width: 100%;
      min-height: 104px;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      cursor: pointer;
      transition: border-color 0.22s ease, transform 0.18s ease, background 0.22s ease, box-shadow 0.22s ease;
    }

    .passenger-card:hover {
      border-color: rgba(67, 169, 255, 0.7);
      background:
        linear-gradient(180deg, rgba(67,169,255,0.12), rgba(255,255,255,0.04)),
        var(--panel);
    }

    .passenger-card:active {
      transform: scale(0.985);
    }

    .passenger-card.selected {
      border-color: rgba(67, 169, 255, 0.92);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.1),
        0 0 0 4px rgba(67, 169, 255, 0.16),
        0 18px 46px rgba(0,0,0,0.24);
    }

    .passenger-name {
      font-size: 24px;
      font-weight: 950;
      letter-spacing: -0.04em;
    }

    .passenger-seat {
      margin-top: 5px;
      color: var(--muted);
      font-size: 16px;
      font-weight: 800;
    }

    .selected-pill {
      color: var(--blue);
      font-size: 13px;
      font-weight: 950;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .passenger-card.selected .selected-pill {
      opacity: 1;
    }

    .advisory-list {
      display: grid;
      gap: 12px;
    }

    .advisory-card {
      padding: 16px;
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 14px;
      align-items: start;
    }

    .advisory-icon {
      width: 42px;
      height: 42px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background: rgba(67, 169, 255, 0.12);
      color: var(--blue);
      font-size: 14px;
      font-weight: 950;
    }

    .advisory-title {
      font-size: 17px;
      font-weight: 950;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .advisory-text {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.38;
    }

    .details-card {
      overflow: hidden;
    }

    .details-route-band {
      padding: 18px;
      background:
        radial-gradient(circle at top right, rgba(67, 169, 255, 0.18), transparent 40%),
        rgba(255, 255, 255, 0.04);
      border-bottom: 1px solid var(--line);
    }

    .details-route {
      font-size: clamp(33px, 10vw, 50px);
      font-weight: 950;
      line-height: 1;
      letter-spacing: -0.055em;
    }

    .details-route span {
      color: var(--blue);
    }

    .details-subroute {
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 800;
    }

    .timeline {
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    .timeline-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: end;
    }

    .timeline-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .timeline-airport {
      font-size: 23px;
      font-weight: 950;
      letter-spacing: -0.04em;
    }

    .timeline-city {
      color: var(--muted);
      font-size: 14px;
      font-weight: 750;
      margin-top: 3px;
    }

    .timeline-time {
      font-size: 31px;
      font-weight: 950;
      letter-spacing: -0.055em;
      white-space: nowrap;
    }

    .details-divider {
      height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0.12), rgba(255,255,255,0.32), rgba(255,255,255,0.12));
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--line);
      border-top: 1px solid var(--line);
    }

    .detail-stat {
      background: rgba(11, 16, 27, 0.72);
      padding: 14px 12px;
    }

    .detail-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    .detail-value {
      font-size: 18px;
      font-weight: 950;
      letter-spacing: -0.03em;
      overflow-wrap: anywhere;
    }

    .arrival-card {
      padding: 16px;
    }

    .passport-notice {
      border: 1px solid rgba(67, 169, 255, 0.42);
      background:
        linear-gradient(180deg, rgba(67, 169, 255, 0.18), rgba(67, 169, 255, 0.08)),
        rgba(12, 26, 45, 0.72);
      border-radius: 22px;
      padding: 16px;
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 14px;
      align-items: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 18px 42px rgba(0,0,0,0.22);
    }

    .passport-notice img {
      width: 58px;
      height: 58px;
      object-fit: contain;
    }

    .notice-title {
      font-size: 20px;
      font-weight: 950;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }

    .notice-text {
      color: rgba(255, 255, 255, 0.74);
      font-size: 14px;
      font-weight: 750;
      line-height: 1.35;
    }

    .arrival-meta {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .arrival-meta .detail-stat {
  border-radius: 18px;
  border: 1px solid var(--line);
  overflow: hidden;
}

    .button-row {
      margin-top: 20px;
    }

    .continue-button {
      width: 100%;
      min-height: 58px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(180deg, #2ce98c, #12b967);
      color: #04140b;
      font-size: 18px;
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 16px 34px rgba(18, 185, 103, 0.25);
      transition: transform 0.16s ease, opacity 0.16s ease;
    }

    .continue-button:active {
      transform: scale(0.975);
    }

    .continue-button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      box-shadow: none;
    }

    .unavailable {
      min-height: calc(100svh - 70px);
      display: grid;
      place-items: center;
    }

    .unavailable-card {
      width: min(100%, 430px);
      border: 1px solid var(--line);
      border-radius: 26px;
      background:
        radial-gradient(circle at top, rgba(255, 75, 85, 0.16), transparent 45%),
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.035)),
        var(--panel);
      padding: 30px 24px;
      text-align: center;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
    }

    .unavailable-icon {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin: 0 auto 18px;
      background: rgba(255,255,255,0.08);
      color: var(--red);
      font-size: 18px;
      font-weight: 950;
    }

    .unavailable-title {
      font-size: 28px;
      font-weight: 950;
      letter-spacing: -0.045em;
      margin-bottom: 8px;
    }

    .unavailable-text {
      color: var(--muted);
      font-size: 15px;
      font-weight: 750;
      line-height: 1.4;
    }

    .modal-cover {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: grid;
      place-items: center;
      padding: 24px;
      z-index: 20;
      backdrop-filter: blur(14px);
    }

    .modal {
      width: min(100%, 360px);
      border: 1px solid var(--line);
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.04)),
        var(--panel-strong);
      padding: 30px;
      text-align: center;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.48);
      animation: modalIn 0.32s cubic-bezier(.2,.8,.2,1) both;
    }

    .spinner {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.14);
      border-top-color: var(--green);
      margin: 0 auto 18px;
      animation: spin 1s linear infinite;
    }

    .modal.success .spinner {
      animation: none;
      border: none;
      background: var(--green);
      color: #04140b;
      display: grid;
      place-items: center;
      font-size: 30px;
      font-weight: 950;
    }

    .modal.success .spinner::before {
      content: "OK";
      font-size: 17px;
    }

    .modal-title {
      font-size: 25px;
      font-weight: 950;
      letter-spacing: -0.04em;
      margin-bottom: 6px;
    }

    .modal-text {
      color: var(--muted);
      font-size: 15px;
      font-weight: 750;
    }

    @media (max-width: 520px) {
      .app {
  padding: calc(8px + env(safe-area-inset-top)) 14px calc(28px + env(safe-area-inset-bottom));
}

      .flight-hero {
        grid-template-columns: 46px 1fr;
        padding: 14px;
        border-radius: 22px;
      }

      .airline-logo {
        width: 44px;
        height: 44px;
      }

      .hero-code {
        font-size: 21px;
      }

      .progress {
  width: min(100%, 245px);
}

      .passenger-name {
        font-size: 21px;
      }

      .details-grid {
        grid-template-columns: 1fr;
      }

      .timeline-row {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .timeline-time {
        font-size: 29px;
      }

      .passport-notice {
        grid-template-columns: 48px 1fr;
        padding: 14px;
      }

      .passport-notice img {
        width: 48px;
        height: 48px;
      }

      .arrival-meta {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="screen hidden" id="checkInScreen">

      <section class="flight-hero" id="flightHero"></section>

      <div class="progress-wrap">
        <div class="progress" id="progressBar"></div>
        <div class="progress-underline"></div>
      </div>

      <section class="step-panel" id="stepPanel"></section>
    </section>

    <section class="screen unavailable hidden" id="unavailableScreen">
      <div class="unavailable-card">
        <div class="unavailable-icon">LOCK</div>
        <div class="unavailable-title" id="unavailableTitle">This site is locked</div>
        <div class="unavailable-text" id="unavailableText">Check in opens 24 hours before scheduled departure.</div>
      </div>
    </section>
  </main>

  <div class="modal-cover hidden" id="loadingModal">
    <div class="modal" id="modalBox">
      <div class="spinner"></div>
      <div class="modal-title" id="modalTitle">Checking you in</div>
      <div class="modal-text" id="modalText">Securing boarding pass access...</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

    import {
      getFirestore,
      collection,
      doc,
      onSnapshot,
      updateDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAehW0Ab5c0bpb824JyPBa43YBvyR7zwig",
      authDomain: "msfs-flight-tracker.firebaseapp.com",
      projectId: "msfs-flight-tracker",
      storageBucket: "msfs-flight-tracker.firebasestorage.app",
      messagingSenderId: "477994284624",
      appId: "1:477994284624:web:50bef41d84258420ea8355"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const PASSENGER_NAME = "SHLOAK PATEL";

    const checkInScreen = document.getElementById("checkInScreen");
    const unavailableScreen = document.getElementById("unavailableScreen");
    const unavailableTitle = document.getElementById("unavailableTitle");
    const unavailableText = document.getElementById("unavailableText");
    const flightHero = document.getElementById("flightHero");
    const progressBar = document.getElementById("progressBar");
    const stepPanel = document.getElementById("stepPanel");
    const loadingModal = document.getElementById("loadingModal");
    const modalBox = document.getElementById("modalBox");
    const modalTitle = document.getElementById("modalTitle");
    const modalText = document.getElementById("modalText");

    const params = new URLSearchParams(window.location.search);
    const flightId = params.get("flightId") || "";
    const returnUrl = params.get("returnUrl") || "";

    let activeFlight = null;
    let activeStep = 0;
    let passengerSelected = false;

    function escapeHTML(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function buildLocalDateTime(dateValue, timeValue) {
      if (!dateValue || !timeValue) return null;
      return new Date(`${dateValue}T${timeValue}:00`);
    }

    function getDepartureDateTime(flight) {
      return buildLocalDateTime(flight.flightDateRaw, flight.scheduledDeparture);
    }

    function getArrivalDateTime(flight) {
      const departure = getDepartureDateTime(flight);
      const arrival = buildLocalDateTime(flight.flightDateRaw, flight.scheduledArrival);

      if (!departure || !arrival) return arrival;

      if (arrival <= departure || flight.overnight === true) {
        arrival.setDate(arrival.getDate() + 1);
      }

      return arrival;
    }

    function getCheckInOpenDate(flight) {
      const departure = getDepartureDateTime(flight);
      if (!departure || Number.isNaN(departure.getTime())) return null;

      const openDate = new Date(departure);
      openDate.setMinutes(openDate.getMinutes() - 24 * 60);
      return openDate;
    }

    function hasCheckInOpened(flight) {
      if (!flight) return false;
      if (flight.checkInOpened === true) return true;

      const openDate = getCheckInOpenDate(flight);
      return openDate && new Date() >= openDate;
    }

    function isEligibleForCheckIn(flight) {
      if (!flight) return false;
      if (flight.checkedIn === true) return false;
      if (flight.phase && flight.phase !== "scheduled") return false;
      return hasCheckInOpened(flight);
    }

    function getAirlineLogoPath(airlineCode) {
      const code = String(airlineCode || "").trim().toLowerCase();
      return code ? `./${code}.png` : "";
    }

    function formatTime(dateOrTime) {
      if (!dateOrTime) return "--";

      if (dateOrTime instanceof Date) {
        return dateOrTime.toLocaleTimeString([], {
          hour: "numeric",
          minute: "2-digit"
        });
      }

      const fakeDate = new Date(`2026-01-01T${dateOrTime}:00`);
      if (Number.isNaN(fakeDate.getTime())) return "--";

      return fakeDate.toLocaleTimeString([], {
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function formatDate(dateValue) {
      if (!dateValue) return "--";

      const date = new Date(`${dateValue}T00:00:00`);

      return date.toLocaleDateString("en-US", {
        weekday: "short",
        month: "short",
        day: "numeric",
        year: "numeric"
      });
    }

    function getReservationCode(flight) {
      if (flight.reservationCode) {
        return String(flight.reservationCode).trim().toUpperCase();
      }

      const source = `${flight.id || ""}${flight.airline || ""}${flight.flightNumber || ""}${flight.flightDateRaw || ""}`;
      const alphabet = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let hash = 0;

      for (let index = 0; index < source.length; index += 1) {
        hash = ((hash << 5) - hash) + source.charCodeAt(index);
        hash |= 0;
      }

      let code = "";
      let value = Math.abs(hash) || 1;

      for (let index = 0; index < 6; index += 1) {
        code += alphabet[value % alphabet.length];
        value = Math.floor(value / alphabet.length) + index + 7;
      }

      return code;
    }

    function getSteps() {
      const steps = ["Passenger", "Advisories", "Flight"];

      if (activeFlight?.internationalUSArrival === true) {
        steps.push("Arrival");
      }

      return steps;
    }

    function showUnavailable(title, text) {
      checkInScreen.classList.add("hidden");
      unavailableScreen.classList.remove("hidden");
      unavailableTitle.textContent = title;
      unavailableText.textContent = text;
    }

    function showCheckIn() {
      unavailableScreen.classList.add("hidden");
      checkInScreen.classList.remove("hidden");
    }

    function renderHero() {
      const airline = activeFlight.airline || "AA";

      flightHero.innerHTML = `
        <img
          class="airline-logo"
          src="${getAirlineLogoPath(airline)}"
          alt="${escapeHTML(airline)} logo"
          onerror="this.style.display='none';"
        />
        <div>
          <div class="route">
            <span>${escapeHTML(activeFlight.departureAirport || "DEP")}</span>
            &rarr;
            <span>${escapeHTML(activeFlight.arrivalAirport || "ARR")}</span>
          </div>
          <div class="hero-meta">
            ${escapeHTML(formatDate(activeFlight.flightDateRaw))} &bull; ${escapeHTML(formatTime(activeFlight.scheduledDeparture))} &bull; ${escapeHTML(airline)} ${escapeHTML(activeFlight.flightNumber || "0000")}
          </div>
          <div class="hero-code">${escapeHTML(getReservationCode(activeFlight))}</div>
        </div>
      `;
    }

    function renderProgress() {
      const steps = getSteps();
      const progressPercent = steps.length <= 1
        ? 0
        : (activeStep / (steps.length - 1)) * 100;

      progressBar.style.setProperty("--progress-width", `${progressPercent}%`);

      progressBar.innerHTML = `
        <div class="progress-line"></div>
        <div class="progress-fill"></div>
        ${steps.map((step, index) => `
  <button class="dot ${index <= activeStep ? "active" : ""}" type="button" data-step="${index}" aria-label="${escapeHTML(step)}"></button>
`).join("")}
      `;

      progressBar.querySelectorAll("[data-step]").forEach((dot) => {
  dot.addEventListener("click", () => {
    const nextStep = Number(dot.dataset.step);

    if (Number.isNaN(nextStep) || nextStep === activeStep) return;

    if (nextStep > 0 && passengerSelected !== true) {
      passengerSelected = true;
    }

    transitionToStep(nextStep);
  });
});
    }

    function renderPassengerStep() {
      stepPanel.innerHTML = `
        <h2 class="panel-title">Select passengers to check in</h2>

        <button class="passenger-card ${passengerSelected ? "selected" : ""}" id="passengerCard" type="button">
          <div>
            <div class="passenger-name">${PASSENGER_NAME}</div>
            <div class="passenger-seat">Seat ${escapeHTML(activeFlight.assignedSeat || "--")} &bull; ${escapeHTML(activeFlight.seatCabin || "Economy")}</div>
          </div>
          <div class="selected-pill">Selected</div>
        </button>

        <div class="button-row">
          <button class="continue-button" id="continueButton" type="button" ${passengerSelected ? "" : "disabled"}>Continue</button>
        </div>
      `;

      const passengerCard = document.getElementById("passengerCard");
      const continueButton = document.getElementById("continueButton");

      passengerCard.addEventListener("click", () => {
        passengerSelected = true;
        passengerCard.classList.add("selected");
        continueButton.disabled = false;
      });

      continueButton.addEventListener("click", () => {
        transitionToStep(1);
      });
    }

    function renderAdvisoriesStep() {
      stepPanel.innerHTML = `
        <h2 class="panel-title">Travel advisories</h2>

        <div class="advisory-list">
          <section class="advisory-card">
            <div class="advisory-icon">HAZ</div>
            <div>
              <div class="advisory-title">Hazardous materials</div>
              <div class="advisory-text">Do not pack explosives, compressed gases, flammable liquids, lithium battery hazards, or other restricted materials.</div>
            </div>
          </section>

          <section class="advisory-card">
            <div class="advisory-icon">3.4</div>
            <div>
              <div class="advisory-title">Liquids and gels</div>
              <div class="advisory-text">Carry-on liquids should follow standard security limits unless they are medically required or packed in checked baggage.</div>
            </div>
          </section>

          <section class="advisory-card">
            <div class="advisory-icon">ID</div>
            <div>
              <div class="advisory-title">Travel documents</div>
              <div class="advisory-text">Names, identification, and travel documents must match the passenger traveling on this reservation.</div>
            </div>
          </section>

          <section class="advisory-card">
            <div class="advisory-icon">SEC</div>
            <div>
              <div class="advisory-title">Security screening</div>
              <div class="advisory-text">All passengers and baggage remain subject to screening before departure.</div>
            </div>
          </section>
        </div>

        <div class="button-row">
          <button class="continue-button" id="continueButton" type="button">Continue</button>
        </div>
      `;

      document.getElementById("continueButton").addEventListener("click", () => {
        transitionToStep(2);
      });
    }

    function renderFlightDetailsStep() {
      const departure = getDepartureDateTime(activeFlight);
      const arrival = getArrivalDateTime(activeFlight);
      const hasArrivalStep = activeFlight.internationalUSArrival === true;

      stepPanel.innerHTML = `
        <h2 class="panel-title">Flight details</h2>

        <section class="details-card">
          <div class="details-route-band">
            <div class="details-route">
              <span>${escapeHTML(activeFlight.departureAirport || "DEP")}</span>
              &rarr;
              <span>${escapeHTML(activeFlight.arrivalAirport || "ARR")}</span>
            </div>
            <div class="details-subroute">
              ${escapeHTML(activeFlight.cityDeparture || "Departure")} to ${escapeHTML(activeFlight.cityArrival || "Arrival")}
            </div>
          </div>

          <div class="timeline">
            <div class="timeline-row">
              <div>
                <div class="timeline-label">Departure</div>
                <div class="timeline-airport">${escapeHTML(activeFlight.departureAirport || "DEP")}</div>
                <div class="timeline-city">${escapeHTML(activeFlight.cityDeparture || "Departure")}</div>
              </div>
              <div class="timeline-time">${escapeHTML(formatTime(departure))}</div>
            </div>

            <div class="details-divider"></div>

            <div class="timeline-row">
              <div>
                <div class="timeline-label">Arrival</div>
                <div class="timeline-airport">${escapeHTML(activeFlight.arrivalAirport || "ARR")}</div>
                <div class="timeline-city">${escapeHTML(activeFlight.cityArrival || "Arrival")}</div>
              </div>
              <div class="timeline-time">${escapeHTML(formatTime(arrival))}</div>
            </div>
          </div>

          <div class="details-grid">
            <div class="detail-stat">
              <div class="detail-label">Flight</div>
              <div class="detail-value">${escapeHTML(activeFlight.airline || "AA")} ${escapeHTML(activeFlight.flightNumber || "0000")}</div>
            </div>

            <div class="detail-stat">
              <div class="detail-label">Seat</div>
              <div class="detail-value">${escapeHTML(activeFlight.assignedSeat || "--")}</div>
            </div>

            <div class="detail-stat">
              <div class="detail-label">Code</div>
              <div class="detail-value">${escapeHTML(getReservationCode(activeFlight))}</div>
            </div>
          </div>
        </section>

        <div class="button-row">
          <button class="continue-button" id="continueButton" type="button">${hasArrivalStep ? "Continue" : "Check in"}</button>
        </div>
      `;

      document.getElementById("continueButton").addEventListener("click", () => {
        if (hasArrivalStep) {
          transitionToStep(3);
          return;
        }

        completeCheckIn();
      });
    }

    function renderArrivalStep() {
      stepPanel.innerHTML = `
        <h2 class="panel-title">Arrival details</h2>

        <section class="arrival-card">
          <div class="passport-notice">
            <img src="./cbp.png" alt="CBP logo" onerror="this.style.display='none';" />
            <div>
              <div class="notice-title">International travel requires a valid passport</div>
              <div class="notice-text">Make sure your passport is valid before entering the United States. You may need to complete customs or preclearance before this trip can be completed.</div>
            </div>
          </div>

          <div class="arrival-meta">
            <div class="detail-stat">
              <div class="detail-label">Arrival</div>
              <div class="detail-value">${escapeHTML(activeFlight.arrivalAirport || "ARR")}</div>
            </div>

            <div class="detail-stat">
              <div class="detail-label">Traveler</div>
              <div class="detail-value">Shloak Patel</div>
            </div>
          </div>
        </section>

        <div class="button-row">
          <button class="continue-button" id="continueButton" type="button">Check in</button>
        </div>
      `;

      document.getElementById("continueButton").addEventListener("click", completeCheckIn);
    }

    function renderStep() {
      renderHero();
      renderProgress();

      stepPanel.classList.remove("exiting");

      if (activeStep === 0) renderPassengerStep();
      if (activeStep === 1) renderAdvisoriesStep();
      if (activeStep === 2) renderFlightDetailsStep();
      if (activeStep === 3) renderArrivalStep();
    }

    function transitionToStep(nextStep) {
      stepPanel.classList.add("exiting");

      setTimeout(() => {
        activeStep = nextStep;
        stepPanel.classList.remove("exiting");
        stepPanel.style.animation = "none";
        void stepPanel.offsetWidth;
        stepPanel.style.animation = "";
        renderStep();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }, 190);
    }

    function showLoadingModal() {
      modalBox.classList.remove("success");
      modalTitle.textContent = "Checking you in";
      modalText.textContent = "Securing boarding pass access...";
      loadingModal.classList.remove("hidden");
    }

    function showSuccessModal() {
      modalBox.style.animation = "none";
      void modalBox.offsetWidth;
      modalBox.classList.add("success");
      modalBox.style.animation = "modalIn 0.32s cubic-bezier(.2,.8,.2,1) both";
      modalTitle.textContent = "Successfully checked in";
      modalText.textContent = "Your boarding pass is now available.";
    }

    async function completeCheckIn() {
      if (!activeFlight || !activeFlight.id) return;

      showLoadingModal();

      try {
        await new Promise((resolve) => setTimeout(resolve, 5000));

        await updateDoc(doc(db, "flights", activeFlight.id), {
          checkedIn: true,
          checkedInAt: serverTimestamp(),
          checkInOpened: true,
          checkInOpenedAt: activeFlight.checkInOpenedAt || serverTimestamp()
        });

        showSuccessModal();

        setTimeout(() => {
          if (returnUrl) {
            window.location.href = returnUrl;
            return;
          }

          loadingModal.classList.add("hidden");
          showUnavailable("Check in complete", "Your boarding pass is now available on the main flight site.");
        }, 1600);
      } catch (error) {
        console.error("Check in failed:", error);
        modalBox.classList.remove("success");
        modalTitle.textContent = "Check in failed";
        modalText.textContent = "Reload the page and try again.";
      }
    }

    function startFlight(flight) {
      activeFlight = flight;
      activeStep = 0;
      passengerSelected = false;

      showCheckIn();
      renderStep();
    }

    if (!flightId) {
      showUnavailable("This site is locked", "Open check in from a specific flight on the main site.");
    }

    onSnapshot(collection(db, "flights"), (snapshot) => {
      if (!flightId) return;

      const flightDoc = snapshot.docs.find((item) => item.id === flightId);

      if (!flightDoc) {
        showUnavailable("Flight not found", "This check-in session could not find the selected flight.");
        return;
      }

      const flight = {
        id: flightDoc.id,
        ...flightDoc.data()
      };

      if (flight.checkedIn === true) {
        showUnavailable("Already checked in", "Your boarding pass is already available on the main flight site.");
        return;
      }

      if (!isEligibleForCheckIn(flight)) {
        showUnavailable("Check in unavailable", "Check in opens 24 hours before scheduled departure.");
        return;
      }

      if (!activeFlight) {
        startFlight(flight);
        return;
      }

      activeFlight = flight;
      renderHero();
      renderProgress();
    }, (error) => {
      console.error("Error loading flight:", error);
      showUnavailable("Unable to load check in", "Reload the page and try again.");
    });
  </script>
</body>
</html>
